<!DOCTYPE html>
<html>
<head>
  <script>
    var base = '/AccountResearcherPortal';
    var path = window.location.pathname;
    if (path.startsWith(base)) path = path.slice(base.length);
    window.location.replace(base + '/?path=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
